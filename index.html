<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; worker-src 'self' blob:" />
  <title data-i18n="title">Murih — معاكس ألوان PDF</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col">
  <header class="border-b border-gray-800 px-4 py-4 sm:px-6">
    <div class="max-w-3xl mx-auto flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-emerald-500 flex items-center justify-center font-bold text-gray-950 text-sm">M</div>
      <h1 class="text-lg font-semibold leading-tight">Murih</h1>
      <button id="lang-toggle" class="ml-auto text-xs font-medium text-gray-400 hover:text-emerald-400 transition-colors border border-gray-700 rounded-lg px-3 py-1.5">EN</button>
    </div>
  </header>

  <main class="flex-1 px-4 py-8 sm:px-6">
    <div class="max-w-3xl mx-auto space-y-6">

      <section id="drop-zone" class="relative border-2 border-dashed border-gray-700 rounded-2xl p-8 sm:p-12 text-center cursor-pointer transition-colors hover:border-emerald-500/50 hover:bg-gray-900/50">
        <input type="file" id="file-input" accept=".pdf" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
        <div class="space-y-3 pointer-events-none">
          <svg class="mx-auto w-12 h-12 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0 3 3m-3-3-3 3M6.75 19.5a4.5 4.5 0 0 1-1.41-8.775 5.25 5.25 0 0 1 10.233-2.33 3 3 0 0 1 3.758 3.848A3.752 3.752 0 0 1 18 19.5H6.75Z" />
          </svg>
          <p class="text-gray-300 font-medium" data-i18n="dropText">اسحب ملف PDF هنا أو انقر للتصفح</p>

        </div>
      </section>

      <section id="controls" class="hidden space-y-4">
        <div class="bg-gray-900 rounded-xl p-4 sm:p-5 border border-gray-800">
          <div class="flex flex-col sm:flex-row sm:items-center gap-4">
            <div class="flex-1 min-w-0">
              <p id="file-name" class="font-medium truncate text-sm"></p>
              <p id="file-size" class="text-xs text-gray-400 mt-0.5"></p>
            </div>
            <div class="flex items-center gap-3">
              <label for="scale-select" class="text-xs text-gray-400 whitespace-nowrap" data-i18n="quality">الجودة</label>
              <select id="scale-select" data-i18n-group="scale" class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-sm text-gray-200 focus:outline-none focus:ring-2 focus:ring-emerald-500/50">
                <option value="1.5">1.5x — ملف صغير</option>
                <option value="2">2x — متوازن</option>
                <option value="3" selected>3x — حاد (افتراضي)</option>
                <option value="4">4x — أقصى</option>
              </select>
              <p class="text-xs text-gray-500 mt-1" data-i18n="mobileRec">موصى به: 3x للقراءة على الجوال. الأعلى = أوضح لكن ملفات أكبر</p>
            </div>
          </div>

        </div>

        <button id="convert-btn" data-i18n="invertDownload" class="w-full bg-emerald-600 hover:bg-emerald-500 disabled:bg-gray-700 disabled:cursor-not-allowed text-white font-semibold py-3 px-6 rounded-xl transition-colors text-sm sm:text-base">
          عكس الألوان وتحميل
        </button>
      </section>

      <section id="progress" class="hidden space-y-3">
        <div class="bg-gray-900 rounded-xl p-4 border border-gray-800">
          <div class="flex items-center justify-between mb-2">
            <span id="progress-text" class="text-sm text-gray-300" data-i18n="processing">جاري المعالجة...</span>
            <span id="progress-pages" class="text-xs text-gray-500"></span>
          </div>
          <div class="w-full bg-gray-800 rounded-full h-2 overflow-hidden">
            <div id="progress-bar" class="bg-emerald-500 h-full rounded-full transition-all duration-300 ease-out" style="width: 0%"></div>
          </div>
          <p class="text-xs text-gray-500 mt-2 text-center" data-i18n="keepOpen">اترك هذه الصفحة مفتوحة أثناء التحويل</p>
        </div>
      </section>

      <section id="download-section" class="hidden">
        <div class="bg-gray-900 rounded-xl p-5 sm:p-6 border border-gray-800 text-center space-y-3">
          <a id="download-link" data-i18n="downloadPdf" class="inline-block bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-3 px-8 rounded-xl transition-colors text-sm sm:text-base cursor-pointer">
            تحميل PDF المعكوس
          </a>
          <p id="download-filesize" class="text-xs text-gray-500"></p>
        </div>
      </section>

      <section id="error" class="hidden">
        <div class="bg-red-500/10 border border-red-500/30 rounded-xl p-4 text-sm text-red-300">
          <p id="error-message"></p>
          <button id="error-dismiss" class="mt-2 text-xs text-red-400 hover:text-red-300 underline" data-i18n="dismiss">إغلاق</button>
        </div>
      </section>

    </div>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
